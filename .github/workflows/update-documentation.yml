name: Update Versions Documentation

on:
  workflow_run:
    workflows: ["Build All STM32CubeCLT Versions"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-versions:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install scraper dependencies
        run: npm ci --prefix .github/scripts

      - name: Scrape all STM32CubeCLT versions from ST
        id: scrape
        run: |
          echo "Fetching all versions from ST website..."
          ALL_VERSIONS=$(bash .github/scripts/parse-versions.sh)

          DELIMITER=$(openssl rand -hex 8)
          { echo "versions<<${DELIMITER}"; echo "${ALL_VERSIONS}"; echo "${DELIMITER}"; } >> $GITHUB_OUTPUT
          echo "Total versions: $(echo "$ALL_VERSIONS" | jq '. | length')"
          echo "Linux-supported: $(echo "$ALL_VERSIONS" | jq '[.[] | select(.linux_supported == true)] | length')"

      - name: Fetch Docker Hub versions
        id: fetch-versions
        run: |
          echo "Fetching versions from Docker Hub..."

          ALL_TAGS=""
          PAGE=1

          while true; do
            RESPONSE=$(curl -s "https://hub.docker.com/v2/repositories/uoohyo/stm32-cmake/tags?page=${PAGE}&page_size=100")
            TAGS=$(echo "$RESPONSE" | jq -r '.results[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$' || echo "")

            if [ -z "$TAGS" ]; then
              break
            fi

            ALL_TAGS="${ALL_TAGS}${TAGS}"$'\n'

            NEXT=$(echo "$RESPONSE" | jq -r '.next')
            if [ "$NEXT" = "null" ]; then
              break
            fi

            PAGE=$((PAGE + 1))
          done

          TAGS_JSON=$(echo "$ALL_TAGS" | grep -v '^$' | jq -R . | jq -s . || echo '[]')
          DELIMITER=$(openssl rand -hex 8)
          { echo "tags<<${DELIMITER}"; echo "${TAGS_JSON}"; echo "${DELIMITER}"; } >> $GITHUB_OUTPUT
          echo "Docker Hub tags: $(echo "$TAGS_JSON" | jq '. | length')"

      - name: Generate version tables
        env:
          VERSIONS: ${{ steps.scrape.outputs.versions }}
          DOCKER_TAGS: ${{ steps.fetch-versions.outputs.tags }}
        run: |
          echo "Generating version tables..."

          # Full table for docs/versions.md — all versions, newest first
          {
            echo "| Version | Status | ST Download | Docker Pull |"
            echo "| ------- | ------ | ----------- | ----------- |"

            echo "$VERSIONS" | jq -r '
              [.[]]
              | sort_by([.major, .minor, .patch] | map(tonumber))
              | reverse[]
              | "\(.version)\t\(.linux_supported)"
            ' | while IFS=$'\t' read -r version linux_supported; do
              ST_LINK="https://www.st.com/en/development-tools/stm32cubeclt.html"

              if echo "$DOCKER_TAGS" | jq -e --arg v "$version" '. | index($v) != null' > /dev/null 2>&1; then
                STATUS="✅ Available"
                DOCKER_PULL="\`docker pull uoohyo/stm32-cmake:${version}\`"
              elif [ "$linux_supported" = "true" ]; then
                STATUS="🔨 Not Built Yet"
                DOCKER_PULL="-"
              else
                STATUS="⚠️ Not Supported"
                DOCKER_PULL="-"
              fi

              echo "| \`${version}\` | ${STATUS} | [Download](${ST_LINK}) | ${DOCKER_PULL} |"
            done
          } > /tmp/table-full.md

          # README table — top 6 available (linux_supported: true, on Docker Hub), newest first
          echo "" > /tmp/table-readme.md

          # Get versions that are on Docker Hub, newest first, limit to 6
          echo "$VERSIONS" | jq -r --argjson tags "$DOCKER_TAGS" '
            [.[] | select(.linux_supported == true) | select(.version as $v | $tags | index($v) != null)]
            | sort_by([.major, .minor, .patch] | map(tonumber))
            | reverse
            | limit(6; .[])
            | .version
          ' | while read -r version; do
            BUILD_BADGE="https://img.shields.io/github/actions/workflow/status/${{ github.repository }}/build-all-versions.yml?branch=main&label=&style=flat-square"
            BUILD_LINK="https://github.com/${{ github.repository }}/actions/workflows/build-all-versions.yml"
            echo "<tr><td>v${version}</td><td><a href=\"${BUILD_LINK}\"><img src=\"${BUILD_BADGE}\" alt=\"build status\" /></a></td></tr>" >> /tmp/table-readme.md
          done

          echo "Full table: $(wc -l < /tmp/table-full.md) rows"
          echo "README table: $(wc -l < /tmp/table-readme.md) rows"

      - name: Update versions.md
        run: |
          echo "Updating docs/versions.md..."
          cp docs/template/versions.template.md docs/versions.md
          TABLE=$(cat /tmp/table-full.md)
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          awk -v table="$TABLE" -v timestamp="$TIMESTAMP" '
            /<!-- VERSION_TABLE_START -->/ {
              print
              print ""
              print table
              print ""
              skip=1
              next
            }
            /<!-- VERSION_TABLE_END -->/ {
              skip=0
              print
              next
            }
            /<!-- LAST_UPDATE -->/ {
              gsub(/<!-- LAST_UPDATE -->/, timestamp)
            }
            !skip
          ' docs/versions.md > docs/versions.md.tmp

          mv docs/versions.md.tmp docs/versions.md
          echo "versions.md updated successfully"

      - name: Update README.md
        run: |
          echo "Updating README.md..."
          cp docs/template/README.template.md README.md
          TABLE=$(cat /tmp/table-readme.md)

          awk -v table="$TABLE" '
            /<!-- VERSION_TABLE_START -->/ {
              print
              print table
              skip=1
              next
            }
            /<!-- VERSION_TABLE_END -->/ {
              skip=0
              print
              next
            }
            !skip
          ' README.md > README.md.tmp

          mv README.md.tmp README.md
          echo "README.md updated successfully"

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md docs/versions.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📝 auto-update README and versions documentation [skip ci]"
            git push
            echo "Documentation updated successfully"
          fi

      - name: Close building issue
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'building'
            });

            if (issues.data.length === 0) {
              console.log('No building issues found');
              return;
            }

            for (const issue of issues.data) {
              console.log(`Processing issue #${issue.number}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Build completed successfully!**\n\nAll versions have been built and pushed to Docker Hub.\n\n- 📦 [Docker Hub Repository](https://hub.docker.com/r/uoohyo/stm32-cmake/tags)\n- 📋 [Version Documentation](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/versions.md)\n- 📝 README has been updated with the latest versions\n\nThis issue is now closed automatically.`
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['completed']
              });

              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'building'
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });

              console.log(`Issue #${issue.number} closed successfully`);
            }
