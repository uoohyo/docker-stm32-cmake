name: Build All STM32CubeCLT Versions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versions:
        description: 'Versions to build (JSON array, leave empty for auto-detect)'
        required: false
        default: ''
      push_to_registry:
        description: 'Push to Docker Hub'
        type: boolean
        required: false
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      build_versions: ${{ steps.parse.outputs.build_versions }}
      latest_version: ${{ steps.parse.outputs.latest_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event.inputs.versions == ''
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install scraper dependencies
        if: github.event.inputs.versions == ''
        run: npm ci --prefix .github/scripts

      - name: Parse STM32CubeCLT versions
        id: parse
        run: |
          # Use manual input if provided
          if [ -n "${{ github.event.inputs.versions }}" ]; then
            VERSIONS='${{ github.event.inputs.versions }}'
          else
            VERSIONS=$(bash .github/scripts/parse-versions.sh)
          fi

          # All versions (for documentation)
          DELIMITER=$(openssl rand -hex 8)
          { echo "versions<<${DELIMITER}"; echo "${VERSIONS}"; echo "${DELIMITER}"; } >> $GITHUB_OUTPUT

          # Linux-supported versions only (for the build matrix), sorted oldest-first
          BUILD_VERSIONS=$(echo "$VERSIONS" | jq '[.[] | select(.linux_supported == true)] | sort_by([.major, .minor, .patch] | map(tonumber))')
          DELIMITER2=$(openssl rand -hex 8)
          { echo "build_versions<<${DELIMITER2}"; echo "${BUILD_VERSIONS}"; echo "${DELIMITER2}"; } >> $GITHUB_OUTPUT

          # Latest = highest version (last after ascending sort)
          LATEST=$(echo "$BUILD_VERSIONS" | jq -r '.[-1].version')
          echo "latest_version=${LATEST}" >> $GITHUB_OUTPUT

          echo "Total versions: $(echo "$VERSIONS" | jq '. | length')"
          echo "Linux-supported: $(echo "$BUILD_VERSIONS" | jq '. | length')"
          echo "Latest: ${LATEST}"

  download-installers:
    needs: detect-versions
    runs-on: self-hosted
    strategy:
      max-parallel: 3  # Parallel downloads (avoid ST rate limiting)
      matrix:
        version_info: ${{ fromJson(needs.detect-versions.outputs.build_versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js for downloader
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install scraper/downloader dependencies
        run: npm ci --prefix .github/scripts

      - name: Download STM32CubeCLT installer
        env:
          CUBECLT_VERSION: ${{ matrix.version_info.version }}
          ST_USERNAME: ${{ secrets.ST_USERNAME }}
          ST_PASSWORD: ${{ secrets.ST_PASSWORD }}
          OUTPUT_DIR: cubeclt_download
        run: |
          if [ -z "$ST_USERNAME" ] || [ -z "$ST_PASSWORD" ]; then
            echo "::error::ST_USERNAME and ST_PASSWORD secrets must be set"
            exit 1
          fi
          mkdir -p cubeclt_download
          node .github/scripts/download-cubeclt.js

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: cubeclt-installer-${{ matrix.version_info.version }}
          path: cubeclt_download/*.zip
          retention-days: 1

  build-and-push:
    needs: [detect-versions, download-installers]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1  # Sequential builds
      matrix:
        version_info: ${{ fromJson(needs.detect-versions.outputs.build_versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: cubeclt-installer-${{ matrix.version_info.version }}
          path: cubeclt_download

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          load: true
          build-args: |
            CUBECLT_VERSION=${{ matrix.version_info.version }}
          tags: |
            uoohyo/stm32-cmake:${{ matrix.version_info.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test Docker image
        run: |
          echo "Testing STM32CubeCLT ${{ matrix.version_info.version }}..."
          docker run --rm uoohyo/stm32-cmake:${{ matrix.version_info.version }} bash -c "
            if command -v arm-none-eabi-gcc &> /dev/null; then
              echo '✓ ARM GCC found';
              arm-none-eabi-gcc --version | head -1;
            else
              echo '✗ ARM GCC not found';
              exit 1;
            fi
          "

  tag-latest:
    needs: [detect-versions, build-and-push]
    runs-on: ubuntu-latest
    if: '!cancelled() && github.event.inputs.push_to_registry != ''false'''
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push latest
        run: |
          BUILT_VERSION="${{ needs.detect-versions.outputs.latest_version }}"

          # Fetch all existing tags from Docker Hub to find actual latest
          EXISTING_TAGS=$(curl -s "https://hub.docker.com/v2/repositories/uoohyo/stm32-cmake/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || echo "")

          # Combine existing tags with the version just built
          ALL_TAGS=$(printf "%s\n%s" "$EXISTING_TAGS" "$BUILT_VERSION" | grep -v '^$')

          # Find actual latest by version sort
          ACTUAL_LATEST=$(echo "$ALL_TAGS" | sort -V | tail -1)

          echo "Built version: ${BUILT_VERSION}"
          echo "Actual latest across all tags: ${ACTUAL_LATEST}"

          docker pull uoohyo/stm32-cmake:${ACTUAL_LATEST}
          docker tag uoohyo/stm32-cmake:${ACTUAL_LATEST} uoohyo/stm32-cmake:latest
          docker push uoohyo/stm32-cmake:latest

  handle-failure:
    needs: [detect-versions, build-and-push]
    runs-on: ubuntu-latest
    if: failure() && !cancelled()
    permissions:
      issues: write
    steps:
      - name: Mark building issue as failed
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Find open issues with "building" label
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'building'
            });

            if (issues.data.length === 0) {
              console.log('No building issues found');
              return;
            }

            // Process each building issue
            for (const issue of issues.data) {
              console.log(`Marking issue #${issue.number} as failed`);

              // Add failure comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ **Build failed**\n\nSome versions failed to build. Please check the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n**Common issues:**\n- ST credentials expired or invalid\n- Version not available on ST website\n- Network timeout\n\nThis issue will remain open for investigation.`
              });

              // Add "failed" label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['failed']
              });

              // Remove "building" label
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'building'
              });

              console.log(`Issue #${issue.number} marked as failed`);
            }
