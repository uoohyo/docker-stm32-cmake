name: Cache STM32CubeCLT Installer to GitHub Releases

# This workflow downloads an STM32CubeCLT installer from ST's website and
# uploads it to a GitHub Release so that build-all-versions.yml can use it
# without needing direct access to my.st.com (which is blocked from
# GitHub-hosted runners).
#
# Run this workflow once per version — either:
#   a) On a self-hosted runner that can reach my.st.com, or
#   b) Locally: download the .sh.zip manually and use "gh release upload"
#
# After this workflow succeeds, build-all-versions.yml will automatically
# find the cached installer in GitHub Releases and skip the ST download.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'STM32CubeCLT version (e.g. 1.16.0)'
        required: true
      runner:
        description: 'Runner label (self-hosted or ubuntu-latest)'
        required: false
        default: 'ubuntu-latest'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cache-installer:
    runs-on: ${{ github.event.inputs.runner }}
    permissions:
      contents: write  # needed to create releases and upload assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --prefix .github/scripts

      - name: Download STM32CubeCLT installer from ST
        env:
          CUBECLT_VERSION: ${{ github.event.inputs.version }}
          ST_USERNAME: ${{ secrets.ST_USERNAME }}
          ST_PASSWORD: ${{ secrets.ST_PASSWORD }}
          OUTPUT_DIR: cubeclt_download
        run: |
          if [ -z "$ST_USERNAME" ] || [ -z "$ST_PASSWORD" ]; then
            echo "::error::ST_USERNAME and ST_PASSWORD secrets must be set"
            exit 1
          fi
          mkdir -p cubeclt_download
          node .github/scripts/download-cubeclt.js

      - name: Verify downloaded file
        id: verify
        run: |
          ARCHIVE=$(ls -1 cubeclt_download/*.zip 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::No archive found in cubeclt_download/"
            exit 1
          fi
          SIZE=$(du -m "$ARCHIVE" | cut -f1)
          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT
          echo "filename=$(basename "$ARCHIVE")" >> $GITHUB_OUTPUT
          echo "Found: $ARCHIVE (${SIZE} MB)"

      - name: Create GitHub Release and upload installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          RELEASE_TAG="cache-stm32cubeclt-${VERSION}"
          ARCHIVE="${{ steps.verify.outputs.archive }}"

          # Create the release (skip if it already exists)
          if gh release view "${RELEASE_TAG}" &>/dev/null; then
            echo "Release ${RELEASE_TAG} already exists"
          else
            gh release create "${RELEASE_TAG}" \
              --title "STM32CubeCLT ${VERSION} installer cache" \
              --notes "Cached STM32CubeCLT-Lnx ${VERSION} installer for use in CI builds.\n\nThis release is created automatically by the cache-installer workflow and is used by build-all-versions.yml to avoid downloading from ST's website in CI (which requires my.st.com access, blocked from GitHub-hosted runners)." \
              --prerelease
            echo "Created release ${RELEASE_TAG}"
          fi

          # Upload the installer as a release asset
          gh release upload "${RELEASE_TAG}" "${ARCHIVE}" --clobber
          echo "✓ Uploaded $(basename "$ARCHIVE") to release ${RELEASE_TAG}"
