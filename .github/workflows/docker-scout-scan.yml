name: Docker Scout Security Scan

on:
  workflow_run:
    workflows: ["Build All STM32CubeCLT Versions"]
    types: [completed]
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout-scan:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      security-events: write
      issues: write

    strategy:
      matrix:
        version: ['1.21.0', '1.20.0', 'latest']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Analyze image with Docker Scout
        id: scout-cves
        uses: docker/scout-action@v1
        with:
          command: cves
          image: uoohyo/stm32-cmake:${{ matrix.version }}
          format: sarif
          output: scout-results-${{ matrix.version }}.sarif
          exit-code: false  # Don't fail the build
          only-severities: critical,high

      - name: Upload SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: scout-results-${{ matrix.version }}.sarif
          category: docker-scout-${{ matrix.version }}

      - name: Get vulnerability summary
        id: scout-summary
        run: |
          echo "Scanning uoohyo/stm32-cmake:${{ matrix.version }}..."

          # Get detailed CVE report
          docker scout cves uoohyo/stm32-cmake:${{ matrix.version }} \
            --format json \
            --only-severity critical,high \
            > scout-summary.json || true

          # Extract counts
          CRITICAL=$(jq -r '.vulnerabilities[] | select(.severity == "CRITICAL")' scout-summary.json 2>/dev/null | wc -l || echo "0")
          HIGH=$(jq -r '.vulnerabilities[] | select(.severity == "HIGH")' scout-summary.json 2>/dev/null | wc -l || echo "0")
          TOTAL=$(jq -r '.vulnerabilities | length' scout-summary.json 2>/dev/null || echo "0")

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          echo "Version ${{ matrix.version }}: $CRITICAL critical, $HIGH high, $TOTAL total vulnerabilities"

      - name: Get Docker Scout recommendations
        id: recommendations
        run: |
          echo "Getting base image recommendations..."
          docker scout recommendations uoohyo/stm32-cmake:${{ matrix.version }} || true

      - name: Check vulnerability threshold
        if: steps.scout-summary.outputs.critical > 0
        run: |
          echo "::warning::Found ${{ steps.scout-summary.outputs.critical }} CRITICAL vulnerabilities in version ${{ matrix.version }}"
          echo "::warning::Found ${{ steps.scout-summary.outputs.high }} HIGH vulnerabilities in version ${{ matrix.version }}"

      - name: Create issue for critical vulnerabilities
        if: steps.scout-summary.outputs.critical > 5 && matrix.version == 'latest'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const critical = '${{ steps.scout-summary.outputs.critical }}';
            const high = '${{ steps.scout-summary.outputs.high }}';
            const total = '${{ steps.scout-summary.outputs.total }}';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,vulnerability'
            });

            // Don't create duplicate issues
            if (issues.data.some(issue => issue.title.includes('Critical Vulnerabilities Detected'))) {
              console.log('Issue already exists, skipping creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical Vulnerabilities Detected in Docker Image',
              labels: ['security', 'vulnerability', 'high-priority'],
              body: `## Docker Scout Security Alert

            **Image:** \`uoohyo/stm32-cmake:latest\`
            **Scan Date:** ${new Date().toISOString().split('T')[0]}

            ### Vulnerability Summary
            - 🔴 **Critical:** ${critical}
            - 🟠 **High:** ${high}
            - 📊 **Total:** ${total}

            ### Action Required
            1. Review the [Security tab](https://github.com/${context.repo.owner}/${context.repo.repo}/security) for detailed CVE information
            2. Check Docker Scout recommendations: \`docker scout recommendations uoohyo/stm32-cmake:latest\`
            3. Apply security updates or upgrade base image

            ### Quick Fixes
            - Apply \`apt-get upgrade -y\` in Dockerfile
            - Consider Ubuntu 22.04 LTS with latest security patches
            - Remove unnecessary packages

            **Workflow:** [View scan results](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

  compare-images:
    runs-on: ubuntu-latest
    needs: scout-scan
    if: always()

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compare latest vs previous version
        run: |
          echo "Comparing security posture: 1.21.0 vs 1.20.0"
          docker scout compare \
            --to uoohyo/stm32-cmake:1.20.0 \
            uoohyo/stm32-cmake:1.21.0 || true
